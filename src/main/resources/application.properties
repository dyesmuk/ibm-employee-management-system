# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.info.title=EMS REST API
springdoc.info.version=1.0.0
springdoc.info.description=IBM Employee Management System REST API
springdoc.swagger-ui.customCssUrl=/swagger-dark.css

## Expose specific or all endpoints
management.endpoints.web.exposure.include=*
#management.endpoints.web.exposure.include=health,info,metrics,env,beans,mappings
management.endpoint.health.show-details=always
management.info.env.enabled=true
management.endpoint.info.enabled=true
management.endpoint.health.enabled=true

# Change actuator base path
#management.endpoints.web.base-path=/actuator

