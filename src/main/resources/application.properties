# Thymeleaf Configuration
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
# Disable cache for development
spring.thymeleaf.cache=false

# Server Configuration
server.port=8090

# Custom info
info.app.name=EMS API
info.app.version=1.0.0
info.app.description=Employee Management System REST API

# App custom
ems.app.name=IBM Employee Management System
ems.app.version=1.0.0

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/ibm-ems

# OR separately:
# spring.data.mongodb.host=localhost
# spring.data.mongodb.port=27017
# spring.data.mongodb.database=emsdb

